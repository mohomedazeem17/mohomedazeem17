<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="220" height="220">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="edge-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Top face gradient -->
    <linearGradient id="topG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7cffcb"/>
      <stop offset="100%" stop-color="#00d9a3"/>
    </linearGradient>
    <!-- Front face gradient -->
    <linearGradient id="frontG" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00b894"/>
      <stop offset="100%" stop-color="#014d40"/>
    </linearGradient>
    <!-- Right face gradient -->
    <linearGradient id="rightG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#008f7a"/>
      <stop offset="100%" stop-color="#012e26"/>
    </linearGradient>
    <radialGradient id="shadowG">
      <stop offset="0%" stop-color="#00ff9d" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ff9d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="120" cy="236" rx="58" ry="7" fill="url(#shadowG)">
    <animate attributeName="rx" values="58;48;58" dur="3s" keyTimes="0;0.5;1"
      calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="3s" keyTimes="0;0.5;1"
      calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
  </ellipse>

  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-10; 0,0" dur="3s" keyTimes="0;0.5;1"
      calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
      repeatCount="indefinite"/>

    <g filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate"
        from="0 120 125" to="360 120 125"
        dur="10s" repeatCount="indefinite"/>

      <!-- Top face -->
      <polygon points="51,85 120,125 189,85 120,45"
        fill="url(#topG)" stroke="#7cffcb" stroke-width="0.8" stroke-opacity="0.8"/>

      <!-- Front (left) face -->
      <polygon points="51,85 120,125 120,205 51,165"
        fill="url(#frontG)" stroke="#00ff9d" stroke-width="0.8" stroke-opacity="0.6"/>

      <!-- Right face -->
      <polygon points="120,125 189,85 189,165 120,205"
        fill="url(#rightG)" stroke="#00d9a3" stroke-width="0.8" stroke-opacity="0.6"/>

      <!-- Lock glyph on front face -->
      <rect x="72" y="130" width="26" height="20" rx="3"
        fill="none" stroke="#7cffcb" stroke-width="1.6" stroke-opacity="0.85"/>
      <path d="M 76,130 L 76,120 A 9,9 0 0 1 94,120 L 94,130"
        fill="none" stroke="#7cffcb" stroke-width="1.6" stroke-opacity="0.85"/>
      <circle cx="85" cy="140" r="2.4" fill="#7cffcb" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2s" repeatCount="indefinite"/>
      </circle>

      <!-- Binary / data grid on right face -->
      <text x="130" y="115" font-family="'Courier New',monospace" font-size="7" fill="#7cffcb" opacity="0.7">01001</text>
      <text x="130" y="128" font-family="'Courier New',monospace" font-size="7" fill="#7cffcb" opacity="0.55">11010</text>
      <text x="130" y="141" font-family="'Courier New',monospace" font-size="7" fill="#7cffcb" opacity="0.4">00110</text>
      <text x="130" y="154" font-family="'Courier New',monospace" font-size="7" fill="#7cffcb" opacity="0.3">10101</text>

      <!-- Glowing vertices -->
      <circle cx="120" cy="125" r="4" fill="#7cffcb" opacity="0.95" filter="url(#edge-glow)">
        <animate attributeName="r" values="4;2.5;4" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.95;0.4;0.95" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="120" cy="45" r="2.5" fill="#7cffcb" opacity="0.8" filter="url(#edge-glow)">
        <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.5s" begin="0.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="51" cy="85" r="2" fill="#00ff9d" opacity="0.7" filter="url(#edge-glow)">
        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3s" begin="0.7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="189" cy="85" r="2" fill="#00d9a3" opacity="0.7" filter="url(#edge-glow)">
        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.8s" begin="1.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="120" cy="205" r="2" fill="#00b894" opacity="0.6" filter="url(#edge-glow)">
        <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.2s" begin="0.5s" repeatCount="indefinite"/>
      </circle>

      <!-- Pulse ring -->
      <circle cx="120" cy="125" r="18" fill="none" stroke="#00ff9d" stroke-width="0.5" opacity="0">
        <animate attributeName="r" values="18;50;18" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0;0.6" dur="4s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg>
